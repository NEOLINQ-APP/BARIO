name: Build and Deploy BARIO

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || npm install --legacy-peer-deps || echo "No package.json found"

      - name: Build project
        run: npm run build --if-present
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
